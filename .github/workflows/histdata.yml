name: Историческая выгрузка для бэктеста (одноразовая)
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency: histdata

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
      - name: Скачать полную историю серий FRED (API, ключ из секретов)
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: |
          mkdir -p histdata
          rm -f histdata/*_stooq.csv
          series="SOFR IORB IOER WALCL WTREGEN WRESBAL RRPONTSYD RPONTSYD NFCI GDP BAMLH0A0HYM2 BAMLC0A0CM DRTSCILM SP500 VIXCLS VXVCLS PAYEMS SAHMREALTIME CCSA T10Y3M DFII10 T10YIE DGS2 DGS10 CPILFESL CES0500000003 UNRATE DCOILWTICO DTWEXBGS DEXJPUS DEXCHUS DTB3"
          for s in $series; do
            for try in 1 2 3; do
              curl -sf "https://api.stlouisfed.org/fred/series/observations?series_id=$s&api_key=$FRED_KEY&file_type=json&sort_order=asc&limit=100000" -o /tmp/r.json && break
              sleep $((try*3))
            done
            if [ -s /tmp/r.json ]; then
              echo "DATE,VALUE" > "histdata/$s.csv"
              jq -r '.observations[] | select(.value != ".") | .date + "," + .value' /tmp/r.json >> "histdata/$s.csv"
              echo "ok $s $(wc -l < histdata/$s.csv)"
            else
              echo "FAIL $s"
            fi
            rm -f /tmp/r.json
            sleep 1
          done
      - name: Закоммитить в ветку data
        run: |
          git config user.name "histdata-bot"
          git config user.email "actions@github.com"
          git add histdata
          git commit -m "историческая выгрузка FRED для бэктеста" || echo "нечего коммитить"
          git pull --rebase origin data || true
          git push origin data
