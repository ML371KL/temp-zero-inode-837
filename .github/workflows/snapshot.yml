name: Обновление снимка данных

on:
  schedule:
    - cron: "6,26,46 * * * *"   # базовый такт: каждые 20 минут по «незагруженным» минутам
    - cron: "16,36,56 13-21 * * 1-5"  # быстрая полоса: торговые часы США (13–21 UTC) → такт 10 минут
  workflow_dispatch:             # кнопка ручного запуска и вызовы внешнего будильника через API
  push:                          # правка воркфлоу/скриптов/страницы пере-регистрирует расписание и сразу даёт запуск
    branches: [main]             # v4.12: только main — правки в служебных ветках (data) снимок не трогают
    paths:
      - ".github/workflows/snapshot.yml"
      - "scripts/**"
      - "docs/index.html"        # сборщик извлекает боевые регэкспы из страницы — её правка требует пересборки

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15          # v4.12: худший случай (все 16 Finnhub-ключей висят по таймауту) ~14 мин
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24}
      - name: Сбор данных
        env:
          FRED_KEY:    ${{ secrets.FRED_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}     # опционально: серверный LLM-судья новостей (v4.10)
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b:free' }}
        run: node scripts/fetch-snapshot.mjs
      - name: Публикация снимка
        run: |
          git config user.name  "razlom26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/snapshot.json
          if git diff --cached --quiet; then echo "снимок не изменился"; exit 0; fi
          git commit -m "снимок $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main
          git push
